<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>獲獎與榮譽 - 個人網站</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .simple-photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .simple-photo-card {
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--box-shadow);
      overflow: hidden;
    }

    .simple-photo-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .simple-photo-caption {
      font-size: 0.9rem;
      color: var(--light-text);
      padding: 0.75rem 1rem;
    }

    @media (max-width: 900px) {
      .simple-photo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .simple-photo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- ==================== 導航欄 ==================== -->
  <nav data-site-nav></nav>

  <!-- ==================== 開頭部分 ==================== -->
  <section class="hero">
    <div class="hero-content">
      <h1>獲獎與榮譽</h1>
      <p>三張照片與簡短小字說明</p>
    </div>
  </section>

  <!-- ==================== 主要內容 ==================== -->
  <div class="container">
    <section class="section">
      <h2>照片展示</h2>
      <div class="simple-photo-grid">
        <div class="simple-photo-card">
          <img src="images/ME.jpg" alt="照片 1" onerror="this.src='https://via.placeholder.com/600x400?text=Photo+1'">
          <p class="simple-photo-caption">主題 1：學習紀錄 - 考取專業證照前的準備照片。</p>
        </div>

        <div class="simple-photo-card">
          <img src="images/ME.jpg" alt="照片 2" onerror="this.src='https://via.placeholder.com/600x400?text=Photo+2'">
          <p class="simple-photo-caption">主題 2：課程活動 - micro:bit 與地圖應用的體驗。</p>
        </div>

        <div class="simple-photo-card">
          <img src="images/ME.jpg" alt="照片 3" onerror="this.src='https://via.placeholder.com/600x400?text=Photo+3'">
          <p class="simple-photo-caption">主題 3：技術展示 - 學校舉辦的 AR 體驗活動。</p>
        </div>
      </div>
    </section>
  </div>

  <!-- ==================== 頁尾 ==================== -->
  <footer>
    <div class="container">
      <p>&copy; 2024 個人網站。版權所有。</p>
      <p>聯絡方式：<a href="mailto:your.email@example.com" style="color: var(--secondary-color);">zhongbinlin6@gmail.com</a></p>
      <div class="social-links">
        <a href="https://github.com" target="_blank" title="GitHub">🐙</a>
        <a href="https://linkedin.com" target="_blank" title="LinkedIn">💼</a>
        <a href="https://twitter.com" target="_blank" title="Twitter">🐦</a>
        <a href="https://facebook.com" target="_blank" title="Facebook">📘</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
